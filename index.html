<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pi Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --border:   #30363d;
    --text:     #e6edf3;
    --muted:    #8b949e;
    --accent:   #58a6ff;
    --green:    #3fb950;
    --yellow:   #d29922;
    --red:      #f85149;
    --blue:     #58a6ff;
    --radius:   8px;
    --gap:      16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    min-height: 100vh;
    padding: 24px var(--gap);
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  header h1 span { color: var(--accent); }

  #status {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #status::before {
    content: '';
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
  }

  #status.error::before { background: var(--red); }

  /* Tabs */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    padding: 8px 12px;
    margin-bottom: -1px;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  @media (max-width: 600px) {
    .tab-btn {
      font-size: 11px;
      padding: 7px 8px;
    }
  }

  .tab-btn:hover { color: var(--text); }

  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: var(--gap);
    margin-bottom: var(--gap);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }

  .card-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .card-value {
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 10px;
    color: var(--text);
  }

  .card-sub {
    font-size: 12px;
    color: var(--muted);
  }

  /* Progress bar */
  .bar-track {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
    background: var(--green);
  }

  .bar-fill.warn  { background: var(--yellow); }
  .bar-fill.crit  { background: var(--red); }

  /* Uptime / load card spans full width on small screens */
  .card-wide {
    grid-column: span 2;
  }

  @media (max-width: 520px) {
    .card-wide { grid-column: span 1; }
  }

  /* Process table */
  .proc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: var(--gap);
  }

  .proc-card .card-label { margin-bottom: 14px; }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    text-align: left;
    padding: 6px 8px;
    font-size: 13px;
  }

  th {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }

  tr + tr td { border-top: 1px solid var(--border); }

  td.pid   { color: var(--muted); width: 60px; }
  td.name  { font-weight: 600; }
  td.cpu   { text-align: right; width: 90px; }
  td.mem   { text-align: right; width: 80px; color: var(--muted); }

  .badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .badge-green  { background: rgba(63,185,80,.15);  color: var(--green);  }
  .badge-yellow { background: rgba(210,153,34,.15); color: var(--yellow); }
  .badge-red    { background: rgba(248,81,73,.15);  color: var(--red);    }
  .badge-blue   { background: rgba(88,166,255,.15); color: var(--blue);   }
  .badge-gray   { background: rgba(139,148,158,.15); color: var(--muted); }

  /* Memoria tab */
  .memory-search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 10px 14px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  .memory-search:focus { border-color: var(--accent); }
  .memory-search::placeholder { color: var(--muted); }

  .memory-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .memory-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .memory-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .memory-header:hover { background: rgba(255,255,255,0.03); }

  .memory-title {
    flex: 1;
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
  }

  .memory-meta {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .memory-chevron {
    font-size: 10px;
    color: var(--muted);
    transition: transform 0.2s;
  }

  .memory-entry.open .memory-chevron { transform: rotate(90deg); }

  .memory-body {
    display: none;
    padding: 0 14px 14px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.6;
  }

  .memory-entry.open .memory-body { display: block; }

  #memory-count {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  #memory-error {
    color: var(--red);
    font-size: 13px;
    padding: 12px 0;
  }

  footer {
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }

  /* Servicios tab */
  .svc-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .svc-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .svc-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .svc-dot.running  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .svc-dot.failed   { background: var(--red);   box-shadow: 0 0 6px var(--red);   }
  .svc-dot.inactive { background: var(--muted); }

  .svc-name {
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
    min-width: 140px;
  }

  .svc-desc {
    font-size: 12px;
    color: var(--muted);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .svc-badge {
    flex-shrink: 0;
  }

  #svc-updated {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* Alerts banner */
  #alert-banner {
    display: none;
    margin-bottom: 16px;
    border-radius: var(--radius);
    overflow: hidden;
  }

  #alert-banner.visible { display: block; }

  .alert-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    font-size: 13px;
    border-bottom: 1px solid rgba(0,0,0,0.2);
  }

  .alert-item:last-child { border-bottom: none; }

  .alert-item.critical {
    background: rgba(248,81,73,0.15);
    border-left: 3px solid var(--red);
    color: var(--red);
  }

  .alert-item.warning {
    background: rgba(210,153,34,0.15);
    border-left: 3px solid var(--yellow);
    color: var(--yellow);
  }

  .alert-icon { font-size: 14px; flex-shrink: 0; }

  /* Agentes tab */
  .agents-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: var(--gap);
  }

  .agent-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .agent-header {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .agent-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .agent-dot.main     { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
  .agent-dot.subagent { background: var(--green);  box-shadow: 0 0 5px var(--green);  }
  .agent-dot.cron     { background: var(--yellow); }
  .agent-dot.telegram { background: #6db5fb; }
  .agent-dot.other    { background: var(--muted); }

  .agent-label {
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .agent-kind { flex-shrink: 0; }

  .agent-meta {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  /* Logs tab */
  .log-box {
    background: #0a0d12;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    height: 500px;
    overflow-y: auto;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.55;
  }

  .log-line { display: block; white-space: pre-wrap; word-break: break-all; color: #c9d1d9; }
  .log-line.log-error { color: var(--red); }
  .log-line.log-warn  { color: var(--yellow); }

  /* Graficas tab */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 20px 16px;
    margin-bottom: var(--gap);
  }

  .chart-card .card-label { margin-bottom: 14px; }

  .chart-wrap {
    position: relative;
    height: 200px;
  }
</style>
</head>
<body>

<header>
  <h1><span>&#9632;</span> Pi Dashboard</h1>
  <div id="status">Connecting…</div>
</header>

<!-- Alert banner (shown when there are active alerts) -->
<div id="alert-banner"></div>

<!-- Tab navigation -->
<nav class="tabs">
  <button class="tab-btn active" data-tab="stats">&#128187; Sistema</button>
  <button class="tab-btn" data-tab="charts">&#128200; Gr&#225;ficas</button>
  <button class="tab-btn" data-tab="services">&#9881;&#65039; Servicios</button>
  <button class="tab-btn" data-tab="memory">&#129504; Memoria</button>
  <button class="tab-btn" data-tab="logs">&#128203; Logs</button>
  <button class="tab-btn" data-tab="agents">&#129302; Agentes</button>
</nav>

<!-- Stats tab -->
<div class="tab-panel active" id="tab-stats">
  <div class="grid" id="stat-grid">
    <!-- CPU -->
    <div class="card" id="card-cpu">
      <div class="card-label">CPU Usage</div>
      <div class="card-value" id="cpu-val">—</div>
      <div class="card-sub" id="cpu-sub"></div>
      <div class="bar-track"><div class="bar-fill" id="cpu-bar" style="width:0%"></div></div>
    </div>

    <!-- RAM -->
    <div class="card" id="card-ram">
      <div class="card-label">RAM Usage</div>
      <div class="card-value" id="ram-val">—</div>
      <div class="card-sub" id="ram-sub"></div>
      <div class="bar-track"><div class="bar-fill" id="ram-bar" style="width:0%"></div></div>
    </div>

    <!-- Disk -->
    <div class="card" id="card-disk">
      <div class="card-label">Disk Usage</div>
      <div class="card-value" id="disk-val">—</div>
      <div class="card-sub" id="disk-sub"></div>
      <div class="bar-track"><div class="bar-fill" id="disk-bar" style="width:0%"></div></div>
    </div>

    <!-- CPU Temp -->
    <div class="card" id="card-temp">
      <div class="card-label">CPU Temp</div>
      <div class="card-value" id="temp-val">—</div>
      <div class="card-sub" id="temp-sub"></div>
      <div class="bar-track"><div class="bar-fill" id="temp-bar" style="width:0%"></div></div>
    </div>

    <!-- Load -->
    <div class="card">
      <div class="card-label">Load Average</div>
      <div class="card-value" id="load-val">—</div>
      <div class="card-sub" id="load-sub">1 min / 5 min / 15 min</div>
    </div>

    <!-- Uptime -->
    <div class="card">
      <div class="card-label">Uptime</div>
      <div class="card-value" style="font-size:20px;" id="uptime-val">—</div>
      <div class="card-sub" id="uptime-sub"></div>
    </div>
  </div>

  <!-- Top Processes -->
  <div class="proc-card">
    <div class="card-label">Top 5 Processes by CPU Time</div>
    <table>
      <thead>
        <tr>
          <th>PID</th>
          <th>Name</th>
          <th style="text-align:right">CPU Time</th>
          <th style="text-align:right">Mem</th>
        </tr>
      </thead>
      <tbody id="proc-body">
        <tr><td colspan="4" style="color:var(--muted);padding:12px 8px">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Graficas tab -->
<div class="tab-panel" id="tab-charts">
  <div class="chart-card">
    <div class="card-label">CPU % &mdash; last 5 min</div>
    <div class="chart-wrap"><canvas id="chart-cpu"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="card-label">RAM % &mdash; last 5 min</div>
    <div class="chart-wrap"><canvas id="chart-ram"></canvas></div>
  </div>
</div>

<!-- Servicios tab -->
<div class="tab-panel" id="tab-services">
  <div id="svc-updated">Cargando…</div>
  <div class="svc-list" id="svc-list"></div>
</div>

<!-- Memoria tab -->
<div class="tab-panel" id="tab-memory">
  <input
    class="memory-search"
    id="memory-search"
    type="search"
    placeholder="Buscar en memoria… (título o contenido)"
    autocomplete="off"
  />
  <div id="memory-error"></div>
  <div id="memory-count"></div>
  <div class="memory-list" id="memory-list">
    <div style="color:var(--muted);padding:12px 0">Cargando…</div>
  </div>
</div>

<!-- Agentes tab -->
<div class="tab-panel" id="tab-agents">
  <div id="agents-updated" style="font-size:11px;color:var(--muted);margin-bottom:12px">Cargando…</div>
  <div id="agents-error" style="color:var(--red);font-size:13px;margin-bottom:8px"></div>
  <div class="agents-grid" id="agents-grid"></div>
</div>

<!-- Logs tab -->
<div class="tab-panel" id="tab-logs">
  <div id="logs-updated" style="font-size:11px;color:var(--muted);margin-bottom:12px">Cargando…</div>
  <div id="logs-error" style="color:var(--red);font-size:13px;margin-bottom:8px"></div>
  <div class="log-box" id="log-box"></div>
</div>

<footer id="footer">Last updated: —</footer>

<script>
  const API_STATS   = '/api/stats';
  const API_MEMORY  = '/api/memory';
  const API_ALERTS  = '/api/alerts';
  const INTERVAL    = 5000;

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // ── Alerts banner ──────────────────────────────────────────────
  function renderAlerts(alerts) {
    const banner = document.getElementById('alert-banner');
    if (!alerts || !alerts.length) {
      banner.className = '';
      banner.innerHTML = '';
      return;
    }
    banner.className = 'visible';
    banner.innerHTML = alerts.map(a => {
      const icon = a.level === 'critical' ? '🔴' : '⚠️';
      return `<div class="alert-item ${escHtml(a.level)}">` +
             `<span class="alert-icon">${icon}</span>` +
             `<span>${escHtml(a.message)}</span>` +
             `</div>`;
    }).join('');
  }

  function fetchAlerts() {
    fetch(API_ALERTS)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(renderAlerts)
      .catch(() => {});
  }

  fetchAlerts();
  setInterval(fetchAlerts, 5000);

  // ── Tab switching ──────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  // ── Stats tab ──────────────────────────────────────────────────
  function colorClass(pct, warn=60, crit=85) {
    if (pct >= crit) return 'crit';
    if (pct >= warn) return 'warn';
    return '';
  }

  function tempColor(t) {
    if (t === null) return '';
    if (t >= 80) return 'crit';
    if (t >= 65) return 'warn';
    return '';
  }

  function setBar(id, pct, cls) {
    const el = document.getElementById(id);
    el.style.width = Math.min(pct, 100) + '%';
    el.className = 'bar-fill' + (cls ? ' ' + cls : '');
  }

  function setValue(id, text) {
    document.getElementById(id).textContent = text;
  }

  function fmtCpuTime(ticks) {
    const secs = ticks / 100;
    if (secs < 60) return secs.toFixed(1) + 's';
    if (secs < 3600) return (secs / 60).toFixed(1) + 'm';
    return (secs / 3600).toFixed(1) + 'h';
  }

  function update(data) {
    const cpuPct = data.cpu_percent;
    setValue('cpu-val', cpuPct + '%');
    setValue('cpu-sub', '');
    setBar('cpu-bar', cpuPct, colorClass(cpuPct));

    const ram = data.ram;
    setValue('ram-val', ram.percent + '%');
    setValue('ram-sub', ram.used_mb + ' MB / ' + ram.total_mb + ' MB');
    setBar('ram-bar', ram.percent, colorClass(ram.percent));

    const disk = data.disk;
    setValue('disk-val', disk.percent + '%');
    setValue('disk-sub', disk.used_gb + ' GB / ' + disk.total_gb + ' GB');
    setBar('disk-bar', disk.percent, colorClass(disk.percent, 70, 90));

    const temp = data.cpu_temp_c;
    if (temp !== null) {
      setValue('temp-val', temp + ' °C');
      setValue('temp-sub', temp >= 80 ? 'HOT' : temp >= 65 ? 'Warm' : 'Normal');
      setBar('temp-bar', temp, tempColor(temp));
    } else {
      setValue('temp-val', 'N/A');
      setValue('temp-sub', 'sensor unavailable');
    }

    const load = data.load;
    setValue('load-val', load['1min'].toFixed(2));
    setValue('load-sub', load['1min'].toFixed(2) + ' / ' + load['5min'].toFixed(2) + ' / ' + load['15min'].toFixed(2));

    setValue('uptime-val', data.uptime);

    const tbody = document.getElementById('proc-body');
    tbody.innerHTML = '';
    (data.top_processes || []).forEach(p => {
      const tr = document.createElement('tr');
      tr.innerHTML =
        `<td class="pid">${p.pid}</td>` +
        `<td class="name">${escHtml(p.name)}</td>` +
        `<td class="cpu"><span class="badge badge-green">${fmtCpuTime(p.cpu_time)}</span></td>` +
        `<td class="mem">${p.mem_mb} MB</td>`;
      tbody.appendChild(tr);
    });

    const statusEl = document.getElementById('status');
    statusEl.textContent = 'Live';
    statusEl.className = '';

    document.getElementById('footer').textContent =
      'Last updated: ' + new Date().toLocaleTimeString();
  }

  function fetchStats() {
    fetch(API_STATS)
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(update)
      .catch(err => {
        const statusEl = document.getElementById('status');
        statusEl.textContent = 'Error: ' + err.message;
        statusEl.className = 'error';
      });
  }

  fetchStats();
  setInterval(fetchStats, INTERVAL);

  // ── Memoria tab ────────────────────────────────────────────────
  function typeBadge(type) {
    if (type === 'session')    return `<span class="badge badge-blue">session</span>`;
    if (type === 'preference') return `<span class="badge badge-green">preference</span>`;
    return `<span class="badge badge-gray">${escHtml(type)}</span>`;
  }

  function fmtDate(iso) {
    if (!iso) return '';
    // iso is "YYYY-MM-DD HH:MM:SS" from SQLite
    const d = new Date(iso.replace(' ', 'T') + 'Z');
    return d.toLocaleString(undefined, {
      year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function renderMemory(observations) {
    const list = document.getElementById('memory-list');
    const countEl = document.getElementById('memory-count');

    if (!observations.length) {
      list.innerHTML = '<div style="color:var(--muted);padding:12px 0">No se encontraron entradas.</div>';
      countEl.textContent = '';
      return;
    }

    countEl.textContent = observations.length + ' entrada' + (observations.length !== 1 ? 's' : '');
    list.innerHTML = '';

    observations.forEach(obs => {
      const entry = document.createElement('div');
      entry.className = 'memory-entry';
      entry.innerHTML =
        `<div class="memory-header">` +
          typeBadge(obs.type) +
          `<span class="memory-title">${escHtml(obs.title)}</span>` +
          `<span class="memory-meta">${escHtml(obs.project || '')} &middot; ${fmtDate(obs.created_at)}</span>` +
          `<span class="memory-chevron">&#9654;</span>` +
        `</div>` +
        `<div class="memory-body">${escHtml(obs.content || '')}</div>`;

      entry.querySelector('.memory-header').addEventListener('click', () => {
        entry.classList.toggle('open');
      });

      list.appendChild(entry);
    });
  }

  let memoryDebounce = null;

  function fetchMemory(q) {
    const url = q ? API_MEMORY + '?q=' + encodeURIComponent(q) : API_MEMORY;
    const errEl = document.getElementById('memory-error');
    errEl.textContent = '';
    fetch(url)
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(data => {
        if (data.error) {
          errEl.textContent = 'Error: ' + data.error;
          document.getElementById('memory-list').innerHTML = '';
          document.getElementById('memory-count').textContent = '';
        } else {
          renderMemory(data.observations);
        }
      })
      .catch(err => {
        errEl.textContent = 'Error: ' + err.message;
      });
  }

  document.getElementById('memory-search').addEventListener('input', e => {
    clearTimeout(memoryDebounce);
    memoryDebounce = setTimeout(() => fetchMemory(e.target.value.trim()), 300);
  });

  // Load memory when switching to that tab
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.tab === 'memory') {
        const q = document.getElementById('memory-search').value.trim();
        fetchMemory(q);
      }
      if (btn.dataset.tab === 'charts') {
        fetchHistory();
      }
    });
  });

  // ── Graficas tab ────────────────────────────────────────────────
  const API_HISTORY = '/api/history';

  const CHART_DEFAULTS = {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 300 },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#161b22',
        borderColor: '#30363d',
        borderWidth: 1,
        titleColor: '#8b949e',
        bodyColor: '#e6edf3',
      },
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: { color: '#8b949e', font: { size: 10 }, maxTicksLimit: 8 },
        border: { color: '#30363d' },
      },
      y: {
        min: 0,
        max: 100,
        grid: { color: 'rgba(48,54,61,0.5)', drawBorder: false },
        ticks: { color: '#8b949e', font: { size: 10 }, callback: v => v + '%' },
        border: { dash: [4, 4], color: 'transparent' },
      },
    },
  };

  function makeDataset(color) {
    return {
      data: [],
      borderColor: color,
      backgroundColor: color.replace(')', ', 0.12)').replace('rgb', 'rgba'),
      borderWidth: 2,
      pointRadius: 0,
      pointHoverRadius: 4,
      fill: true,
      tension: 0.3,
    };
  }

  const cpuChart = new Chart(document.getElementById('chart-cpu'), {
    type: 'line',
    data: { labels: [], datasets: [makeDataset('rgb(88,166,255)')] },
    options: CHART_DEFAULTS,
  });

  const ramChart = new Chart(document.getElementById('chart-ram'), {
    type: 'line',
    data: { labels: [], datasets: [makeDataset('rgb(63,185,80)')] },
    options: CHART_DEFAULTS,
  });

  function updateCharts(data) {
    cpuChart.data.labels = data.timestamps;
    cpuChart.data.datasets[0].data = data.cpu;
    cpuChart.update();

    ramChart.data.labels = data.timestamps;
    ramChart.data.datasets[0].data = data.ram;
    ramChart.update();
  }

  function fetchHistory() {
    fetch(API_HISTORY)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(updateCharts)
      .catch(() => {});
  }

  // Auto-refresh charts every 5s regardless of active tab
  setInterval(fetchHistory, INTERVAL);

  // ── Agentes tab ─────────────────────────────────────────────────
  const API_SUBAGENTS = '/api/subagents';
  const AGENTS_INTERVAL = 10000;

  function fmtRelTime(ms) {
    if (!ms) return '—';
    const diffSec = Math.floor((Date.now() - ms) / 1000);
    if (diffSec < 60)   return diffSec + 's ago';
    if (diffSec < 3600) return Math.floor(diffSec / 60) + 'm ago';
    if (diffSec < 86400) return Math.floor(diffSec / 3600) + 'h ago';
    return Math.floor(diffSec / 86400) + 'd ago';
  }

  function kindBadge(kind) {
    const map = {
      main:     'badge-blue',
      subagent: 'badge-green',
      cron:     'badge-yellow',
      telegram: 'badge-blue',
      other:    'badge-gray',
    };
    return `<span class="badge ${map[kind] || 'badge-gray'}">${escHtml(kind)}</span>`;
  }

  function renderAgents(data) {
    const grid = document.getElementById('agents-grid');
    const errEl = document.getElementById('agents-error');
    const updEl = document.getElementById('agents-updated');

    if (data.error) {
      errEl.textContent = 'Error: ' + data.error;
      grid.innerHTML = '';
      return;
    }
    errEl.textContent = '';

    const sessions = data.sessions || [];
    if (!sessions.length) {
      grid.innerHTML = '<div style="color:var(--muted)">No se encontraron sesiones.</div>';
      return;
    }

    grid.innerHTML = '';
    sessions.forEach(s => {
      const card = document.createElement('div');
      card.className = 'agent-card';
      const tokStr = s.total_tokens ? s.total_tokens.toLocaleString() + ' tok' : '';
      card.innerHTML =
        `<div class="agent-header">` +
          `<span class="agent-dot ${escHtml(s.kind)}"></span>` +
          `<span class="agent-label" title="${escHtml(s.key)}">${escHtml(s.label)}</span>` +
          `<span class="agent-kind">${kindBadge(s.kind)}</span>` +
        `</div>` +
        `<div class="agent-meta">` +
          `<span>${escHtml(s.model || '—')}</span>` +
          `<span>${tokStr}</span>` +
          `<span>${fmtRelTime(s.updated_at_ms)}</span>` +
        `</div>`;
      grid.appendChild(card);
    });

    updEl.textContent = 'Actualizado: ' + new Date().toLocaleTimeString();
  }

  function fetchAgents() {
    fetch(API_SUBAGENTS)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(renderAgents)
      .catch(err => {
        document.getElementById('agents-error').textContent = 'Error: ' + err.message;
      });
  }

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.tab === 'agents') fetchAgents();
    });
  });

  setInterval(fetchAgents, AGENTS_INTERVAL);

  // ── Logs tab ────────────────────────────────────────────────────
  const API_LOGS = '/api/logs';
  const LOGS_INTERVAL = 10000;

  function renderLogs(data) {
    const box = document.getElementById('log-box');
    const errEl = document.getElementById('logs-error');
    const updEl = document.getElementById('logs-updated');

    if (data.error) {
      errEl.textContent = 'Error: ' + data.error;
      box.innerHTML = '';
      return;
    }
    errEl.textContent = '';

    const lines = data.lines || [];
    const atBottom = box.scrollHeight - box.scrollTop <= box.clientHeight + 20;
    box.innerHTML = '';
    lines.forEach(line => {
      const span = document.createElement('span');
      span.className = 'log-line';
      const lower = line.toLowerCase();
      if (lower.includes('error') || lower.includes('fail')) {
        span.classList.add('log-error');
      } else if (lower.includes('warn')) {
        span.classList.add('log-warn');
      }
      span.textContent = line;
      box.appendChild(span);
    });
    if (atBottom) box.scrollTop = box.scrollHeight;
    updEl.textContent = 'Actualizado: ' + new Date().toLocaleTimeString();
  }

  function fetchLogs() {
    fetch(API_LOGS)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(renderLogs)
      .catch(err => {
        document.getElementById('logs-error').textContent = 'Error: ' + err.message;
      });
  }

  // Load logs when switching to that tab
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.tab === 'logs') fetchLogs();
    });
  });

  setInterval(fetchLogs, LOGS_INTERVAL);

  // ── Servicios tab ───────────────────────────────────────────────
  const API_SERVICES = '/api/services';
  const SVC_INTERVAL = 10000;

  function svcDotClass(active, sub) {
    if (active === 'active' && sub === 'running') return 'running';
    if (active === 'failed') return 'failed';
    return 'inactive';
  }

  function svcBadge(active, sub) {
    const state = sub || active;
    if (active === 'active' && sub === 'running')
      return `<span class="badge badge-green">${escHtml(state)}</span>`;
    if (active === 'failed')
      return `<span class="badge badge-red">${escHtml(state)}</span>`;
    return `<span class="badge badge-gray">${escHtml(state)}</span>`;
  }

  function renderServices(data) {
    const list = document.getElementById('svc-list');
    const updEl = document.getElementById('svc-updated');

    const services = Array.isArray(data) ? data : (data.services || []);
    if (data.error) {
      list.innerHTML = `<div style="color:var(--red);padding:12px 0">${escHtml(data.error)}</div>`;
      return;
    }
    if (!services.length) {
      list.innerHTML = '<div style="color:var(--muted);padding:12px 0">No se encontraron servicios.</div>';
      return;
    }

    list.innerHTML = '';
    services.forEach(svc => {
      const dotCls = svcDotClass(svc.active, svc.sub);
      const row = document.createElement('div');
      row.className = 'svc-row';
      row.innerHTML =
        `<span class="svc-dot ${dotCls}"></span>` +
        `<span class="svc-name">${escHtml(svc.name)}</span>` +
        `<span class="svc-desc">${escHtml(svc.description)}</span>` +
        `<span class="svc-badge">${svcBadge(svc.active, svc.sub)}</span>`;
      list.appendChild(row);
    });

    updEl.textContent = 'Actualizado: ' + new Date().toLocaleTimeString();
  }

  function fetchServices() {
    fetch(API_SERVICES)
      .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(renderServices)
      .catch(err => {
        document.getElementById('svc-list').innerHTML =
          `<div style="color:var(--red);padding:12px 0">Error: ${escHtml(err.message)}</div>`;
      });
  }

  // Load services when switching to that tab
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.tab === 'services') fetchServices();
    });
  });

  // Auto-refresh services every 10s
  setInterval(fetchServices, SVC_INTERVAL);
</script>
</body>
</html>
